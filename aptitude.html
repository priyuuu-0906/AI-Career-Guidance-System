<!DOCTYPE html>
<html>
<head>
    <title>Aptitude Test</title>
</head>
<body>
    <h1>Aptitude Test</h1>
    <form action="/submit_test" method="POST">
        {% for q in questions %}
            <label>{{loop.index}}. {{q[1]}}</label><br>
            <input type="text" name="q{{q[0]}}"><br><br>
        {% endfor %}
        <input type="submit" value="Submit">
    </form>
</body>
</html>
